[package]
name    = "dynatos-web-reactive"
version = "0.1.0"
edition = "2024"

[dependencies]

# Workspace
dynatos-reactive            = { path = "../dynatos-reactive" }
dynatos-sync-types          = { path = "../dynatos-sync-types" }
dynatos-util                = { path = "../dynatos-util" }
dynatos-web                 = { path = "../dynatos-web" }
dynatos-web-reactive-macros = { path = "../dynatos-web-reactive-macros" }
dynatos-web-router          = { path = "../dynatos-web-router" }

duplicate    = { workspace = true }
extend       = { workspace = true }
js-sys       = { workspace = true }
wasm-bindgen = { workspace = true }
web-sys      = { workspace = true }

[features]
sync = ["dynatos-reactive/sync", "dynatos-sync-types/sync", "dynatos-web-router/sync"]

[lints]
workspace = true
